AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Sentio - Plataforma de análisis de voz del cliente (VoC) y experiencia de cliente (CX)

Globals:
  Function:
    Runtime: python3.12
    Timeout: 45    # Bedrock(25s) + Comprehend(~5s) + margen
    MemorySize: 256
    Environment:
      Variables:
        STAGE: !Ref Stage
  Api:
    Cors:
      AllowMethods: "'POST,GET,OPTIONS'"
      AllowHeaders: "'Content-Type'"
      AllowOrigin: "'*'"

Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]

Resources:

  #  API Gateway
  SentioApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub sentio-api-${Stage}
      StageName: !Ref Stage
      BinaryMediaTypes:
        - multipart/form-data
        - application/octet-stream
      Cors:
        AllowMethods: "'POST,GET,OPTIONS'"
        AllowHeaders: "'Content-Type'"
        AllowOrigin: "'*'"

  #  DynamoDB: historial de análisis
  AnalysisTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub sentio-analyses-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE

  #  Lambda: analyze
  SentioAnalyzeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub sentio-analyze-${Stage}
      CodeUri: backend/functions/analyze/
      Handler: handler.lambda_handler
      Description: Recibe feedback de clientes y devuelve análisis NPS, aspectos y riesgo de churn
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action:
                - comprehend:DetectSentiment
                - comprehend:DetectEntities
              Resource: "*"
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:GetItem
                - dynamodb:Query
                - dynamodb:Scan
              Resource: !GetAtt AnalysisTable.Arn
      Environment:
        Variables:
          TABLE_NAME:       !Ref AnalysisTable
          BEDROCK_MODEL_ID: us.anthropic.claude-haiku-4-5-20251001-v1:0
      Events:
        AnalyzePost:
          Type: Api
          Properties:
            RestApiId: !Ref SentioApi
            Path: /analyze
            Method: POST
        AnalyzeBatchPost:
          Type: Api
          Properties:
            RestApiId: !Ref SentioApi
            Path: /analyze/batch
            Method: POST
        HistoryGet:
          Type: Api
          Properties:
            RestApiId: !Ref SentioApi
            Path: /history
            Method: GET
        UploadCsv:
          Type: Api
          Properties:
            RestApiId: !Ref SentioApi
            Path: /upload/csv
            Method: POST
        GetBatch:
          Type: Api
          Properties:
            RestApiId: !Ref SentioApi
            Path: /batch/{batch_id}
            Method: GET
        GetDashboard:
          Type: Api
          Properties:
            RestApiId: !Ref SentioApi
            Path: /dashboard
            Method: GET
        ComparePeriods:
          Type: Api
          Properties:
            RestApiId: !Ref SentioApi
            Path: /dashboard/compare
            Method: GET

Outputs:
  ApiUrl:
    Description: URL base del API de Sentio
    Value: !Sub "https://${SentioApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"
    Export:
      Name: !Sub sentio-api-url-${Stage}

  SentioAnalyzeFunctionArn:
    Description: ARN de la función Lambda de análisis
    Value: !GetAtt SentioAnalyzeFunction.Arn

  AnalysisTableName:
    Description: Nombre de la tabla DynamoDB
    Value: !Ref AnalysisTable
