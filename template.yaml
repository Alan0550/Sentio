AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: TruthLens - API de análisis de credibilidad de noticias

Globals:
  Function:
    Runtime: python3.12
    Timeout: 45    # Bedrock(25s) + Comprehend(~5s) + scraping(~10s) + margen
    MemorySize: 256
    Environment:
      Variables:
        STAGE: !Ref Stage
  Api:
    Cors:
      AllowMethods: "'POST,OPTIONS'"
      AllowHeaders: "'Content-Type'"
      AllowOrigin: "'*'"

Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
  BraveApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: API key de Brave Search (opcional — el sistema funciona sin ella)

Resources:

  #  API Gateway 
  TruthLensApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub truthlens-api-${Stage}
      StageName: !Ref Stage
      Cors:
        AllowMethods: "'POST,OPTIONS'"
        AllowHeaders: "'Content-Type'"
        AllowOrigin: "'*'"

  #  DynamoDB: historial de análisis
  AnalysisTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub truthlens-analysis-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE

  #  Lambda: analyze
  AnalyzeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub truthlens-analyze-${Stage}
      CodeUri: backend/functions/analyze/
      Handler: handler.lambda_handler
      Description: Recibe texto o URL y devuelve score de credibilidad
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action:
                - comprehend:DetectSentiment
                - comprehend:DetectEntities
              Resource: "*"
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"
            - Effect: Allow
              Action:
                - rekognition:DetectModerationLabels
                - rekognition:DetectText
              Resource: "*"
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:Query
                - dynamodb:Scan
              Resource: !GetAtt AnalysisTable.Arn
      Environment:
        Variables:
          TABLE_NAME:    !Ref AnalysisTable
          BRAVE_API_KEY: !Ref BraveApiKey
      Events:
        AnalyzePost:
          Type: Api
          Properties:
            RestApiId: !Ref TruthLensApi
            Path: /analyze
            Method: POST
        HistoryGet:
          Type: Api
          Properties:
            RestApiId: !Ref TruthLensApi
            Path: /history
            Method: GET

Outputs:
  ApiUrl:
    Description: URL base del API
    Value: !Sub "https://${TruthLensApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"
    Export:
      Name: !Sub truthlens-api-url-${Stage}

  AnalyzeFunctionArn:
    Description: ARN de la función analyze
    Value: !GetAtt AnalyzeFunction.Arn
